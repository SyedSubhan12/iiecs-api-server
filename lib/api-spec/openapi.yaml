openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: IIECS-101 Attendance & Invoice Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: students
    description: Student management
  - name: attendance
    description: Attendance management
  - name: payments
    description: Payment management
  - name: invoices
    description: Invoice management
  - name: dashboard
    description: Dashboard statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user info
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  # ── Dashboard ─────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get admin dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  # ── Students ──────────────────────────────────────────────────────────────
  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List all students
      parameters:
        - name: batch
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      operationId: createStudent
      tags: [students]
      summary: Create a new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "201":
          description: Student created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get student by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Student details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Student not found
    patch:
      operationId: updateStudent
      tags: [students]
      summary: Update student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentUpdate"
      responses:
        "200":
          description: Updated student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/by-email/{email}:
    get:
      operationId: getStudentByEmail
      tags: [students]
      summary: Get student by email
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Student details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Not found

  /students/{id}/progress:
    get:
      operationId: getStudentProgress
      tags: [students]
      summary: Get student overall progress (attendance % + payment summary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Student progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProgress"

  # ── Attendance ────────────────────────────────────────────────────────────
  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      parameters:
        - name: studentId
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
        - name: month
          in: query
          schema:
            type: string
        - name: batch
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"
    post:
      operationId: markAttendance
      tags: [attendance]
      summary: Mark attendance for a student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceInput"
      responses:
        "201":
          description: Attendance marked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/{id}:
    patch:
      operationId: updateAttendance
      tags: [attendance]
      summary: Update an attendance record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceUpdate"
      responses:
        "200":
          description: Updated attendance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/scan:
    post:
      operationId: scanQrCode
      tags: [attendance]
      summary: Validate QR code and return student info
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QrScanInput"
      responses:
        "200":
          description: Student found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrScanResult"
        "404":
          description: Student not found

  /attendance/report/monthly:
    get:
      operationId: getMonthlyAttendanceReport
      tags: [attendance]
      summary: Get monthly attendance summary for all students
      parameters:
        - name: month
          in: query
          schema:
            type: string
        - name: batch
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Monthly report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceSummary"

  /attendance/today:
    get:
      operationId: getTodayAttendance
      tags: [attendance]
      summary: Get today's attendance records
      responses:
        "200":
          description: Today's records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  # ── Payments ──────────────────────────────────────────────────────────────
  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List payment records
      parameters:
        - name: studentId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Payment records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Create a payment record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Payment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}:
    get:
      operationId: getPayment
      tags: [payments]
      summary: Get a payment record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
    patch:
      operationId: updatePayment
      tags: [payments]
      summary: Update payment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentUpdate"
      responses:
        "200":
          description: Updated payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  # ── Invoices ──────────────────────────────────────────────────────────────
  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List invoices
      parameters:
        - name: studentId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Generate an invoice for a student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
    patch:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update invoice status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceUpdate"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Auth ────────────────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [role, email]
      properties:
        role:
          type: string
          description: "admin or student"
        email:
          type: string
        studentId:
          type: ["string", "null"]
        name:
          type: ["string", "null"]

    # ── Dashboard ────────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      required: [totalStudents, presentToday, absentToday, pendingPayments, overduePayments, totalPaidAmount, totalPendingAmount, attendanceRate]
      properties:
        totalStudents:
          type: integer
        presentToday:
          type: integer
        absentToday:
          type: integer
        pendingPayments:
          type: integer
        overduePayments:
          type: integer
        totalPaidAmount:
          type: number
        totalPendingAmount:
          type: number
        attendanceRate:
          type: number

    # ── Student ──────────────────────────────────────────────────────────────
    Student:
      type: object
      required: [id, email, fullName, idNumber, batch, status, enrollmentDate, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        fullName:
          type: string
        idNumber:
          type: string
        batch:
          type: string
        qrCodeData:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        cnic:
          type: ["string", "null"]
        status:
          type: string
        enrollmentDate:
          type: string
        createdAt:
          type: string

    StudentInput:
      type: object
      required: [email, fullName, idNumber, batch]
      properties:
        email:
          type: string
        fullName:
          type: string
        idNumber:
          type: string
        batch:
          type: string
        phone:
          type: string
        address:
          type: string
        cnic:
          type: string

    StudentUpdate:
      type: object
      properties:
        fullName:
          type: string
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        cnic:
          type: ["string", "null"]
        status:
          type: string

    StudentProgress:
      type: object
      required: [studentId, fullName, overallAttendancePercentage, totalAttendanceRecords, totalPaid, totalPending]
      properties:
        studentId:
          type: string
        fullName:
          type: string
        overallAttendancePercentage:
          type: number
        totalAttendanceRecords:
          type: integer
        daysPresent:
          type: integer
        daysAbsent:
          type: integer
        daysLate:
          type: integer
        totalPaid:
          type: number
        totalPending:
          type: number

    # ── Attendance ───────────────────────────────────────────────────────────
    AttendanceRecord:
      type: object
      required: [id, studentId, attendanceDate, checkInTime, status, createdAt]
      properties:
        id:
          type: string
        studentId:
          type: string
        studentName:
          type: ["string", "null"]
        studentIdNumber:
          type: ["string", "null"]
        attendanceDate:
          type: string
        checkInTime:
          type: string
        checkOutTime:
          type: ["string", "null"]
        status:
          type: string
        remarks:
          type: ["string", "null"]
        createdAt:
          type: string

    AttendanceInput:
      type: object
      required: [studentId, status]
      properties:
        studentId:
          type: string
        status:
          type: string
        attendanceDate:
          type: string
        checkInTime:
          type: string
        checkOutTime:
          type: ["string", "null"]
        remarks:
          type: ["string", "null"]

    AttendanceUpdate:
      type: object
      properties:
        status:
          type: string
        checkOutTime:
          type: ["string", "null"]
        remarks:
          type: ["string", "null"]

    QrScanInput:
      type: object
      required: [qrData]
      properties:
        qrData:
          type: string

    QrScanResult:
      type: object
      required: [student, alreadyMarkedToday]
      properties:
        student:
          $ref: "#/components/schemas/Student"
        alreadyMarkedToday:
          type: boolean
        todayRecord:
          $ref: "#/components/schemas/AttendanceRecord"

    AttendanceSummary:
      type: object
      required: [studentId, fullName, idNumber, batch, daysPresent, daysAbsent, daysLate, totalDays, attendancePercentage]
      properties:
        studentId:
          type: string
        fullName:
          type: string
        idNumber:
          type: string
        batch:
          type: string
        daysPresent:
          type: integer
        daysAbsent:
          type: integer
        daysLate:
          type: integer
        totalDays:
          type: integer
        attendancePercentage:
          type: number

    # ── Payment ──────────────────────────────────────────────────────────────
    Payment:
      type: object
      required: [id, studentId, amount, status, createdAt]
      properties:
        id:
          type: string
        studentId:
          type: string
        studentName:
          type: ["string", "null"]
        amount:
          type: number
        description:
          type: ["string", "null"]
        dueDate:
          type: ["string", "null"]
        paidDate:
          type: ["string", "null"]
        status:
          type: string
        paymentMethod:
          type: ["string", "null"]
        referenceNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    PaymentInput:
      type: object
      required: [studentId, amount]
      properties:
        studentId:
          type: string
        amount:
          type: number
        description:
          type: string
        dueDate:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    PaymentUpdate:
      type: object
      properties:
        status:
          type: string
        paidDate:
          type: ["string", "null"]
        paymentMethod:
          type: ["string", "null"]
        referenceNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    # ── Invoice ──────────────────────────────────────────────────────────────
    Invoice:
      type: object
      required: [id, studentId, invoiceNumber, amount, status, createdAt]
      properties:
        id:
          type: string
        studentId:
          type: string
        studentName:
          type: ["string", "null"]
        paymentId:
          type: ["string", "null"]
        invoiceNumber:
          type: string
        amount:
          type: number
        issuedDate:
          type: string
        dueDate:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string

    InvoiceInput:
      type: object
      required: [studentId, amount]
      properties:
        studentId:
          type: string
        paymentId:
          type: ["string", "null"]
        amount:
          type: number
        dueDate:
          type: ["string", "null"]

    InvoiceUpdate:
      type: object
      properties:
        status:
          type: string
